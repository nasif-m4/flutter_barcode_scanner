name: flutter_barcode_scanner_example
description: Demonstrates how to use the flutter_barcode_scanner plugin for Android and iOS.
publish_to: 'none'
version: 2.0.0-nullsafety.0

environment:
  sdk: '>=3.1.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_plugin_android_lifecycle: ^2.0.24

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_barcode_scanner:
    git:
      url: https://github.com/decodevM/flutter_barcode_scanner.git

  pedantic: ^1.11.1

flutter:
  uses-material-design: true
